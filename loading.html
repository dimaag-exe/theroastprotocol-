<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Analyzing...</title>

<link rel="stylesheet"
href="style.css">

<style>

  /* ===== EXTREME UI LAYER — matches the rest of Brain.exe ===== */

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    overflow-x: hidden;
    background: #05010d;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    display: block;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(circle at 20% 20%, rgba(140, 60, 255, 0.25), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(0, 255, 220, 0.18), transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(255, 0, 150, 0.18), transparent 45%);
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    100% { filter: hue-rotate(60deg) brightness(1.15); }
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 460px;
    margin: 14vh auto 4vh;
    padding: 40px 28px 34px;
    border-radius: 28px;
    background: rgba(18, 10, 35, 0.55);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03) inset,
      0 25px 60px -15px rgba(0,0,0,0.7),
      0 0 90px -20px rgba(150, 60, 255, 0.55);
    text-align: center;
  }

  .container h1 {
    font-size: 2.2rem;
    margin: 0 0 6px;
    letter-spacing: 1px;
    background: linear-gradient(90deg, #7f5cff, #00e5ff, #ff4ecb, #7f5cff);
    background-size: 300% auto;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    animation: shine 4s linear infinite;
    text-shadow: 0 0 30px rgba(140, 80, 255, 0.35);
  }

  @keyframes shine { to { background-position: 300% center; } }

  .container h2 {
    font-size: 1.05rem;
    font-weight: 500;
    margin: 0 0 30px;
    color: #d9d3ff;
    letter-spacing: 0.4px;
  }

  /* pulsing brain-scan ring, purely decorative */
  .container h2::before {
    content: "🧠";
    display: block;
    font-size: 2.4rem;
    margin-bottom: 14px;
    animation: pulseBrain 1.6s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(140,80,255,0.6));
  }

  @keyframes pulseBrain {
    0%, 100% { transform: scale(1); opacity: 0.9; }
    50%      { transform: scale(1.12); opacity: 1; }
  }

  .progress {
    position: relative;
    width: 100%;
    height: 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.14);
    overflow: hidden;
    margin-bottom: 20px;
  }

  #bar {
    height: 100%;
    width: 0%;
    border-radius: 999px;
    background: linear-gradient(90deg, #8a3ffc, #00e5ff, #ff4ecb);
    background-size: 200% 100%;
    animation: barGradient 2s linear infinite;
    box-shadow: 0 0 16px rgba(140, 80, 255, 0.7);
    transition: width 0.35s ease;
    position: relative;
  }

  @keyframes barGradient {
    0%   { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  /* sweeping shimmer across the bar */
  #bar::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    height: 100%; width: 40%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.55), transparent);
    animation: shimmer 1.1s linear infinite;
  }

  @keyframes shimmer {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }

  #status {
    font-size: 0.9rem;
    color: rgba(230, 225, 255, 0.75);
    letter-spacing: 0.3px;
    min-height: 1.3em;
  }

  #status::after {
    content: "";
    display: inline-block;
    width: 1ch;
    animation: dots 1.2s steps(4, end) infinite;
  }

  @keyframes dots {
    0%   { content: ""; }
    25%  { content: "."; }
    50%  { content: ".."; }
    75%  { content: "..."; }
    100% { content: ""; }
  }

  @media (max-width: 420px) {
    .container { margin: 10vh 16px; padding: 32px 22px 26px; border-radius: 22px; }
    .container h1 { font-size: 1.9rem; }
  }

</style>

</head>

<body>

<canvas id="bg-canvas"></canvas>

<div class="container">

<h1>🧠 Brain.exe</h1>

<h2>Analyzing Your Brain...</h2>

<div class="progress">

<div id="bar"></div>

</div>

<p id="status">
Initializing AI...
</p>

</div>

<script src="loading.js"></script>

<script>
  /* ===== EXTREME UI LAYER — particle background only ===== */
  /* Does not touch loading.js, which still controls #bar width and #status text */

  (function () {
    var canvas = document.getElementById('bg-canvas');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var count = 45;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function rand(min, max) { return Math.random() * (max - min) + min; }
    var colors = ['#8a3ffc', '#00e5ff', '#ff4ecb', '#7f5cff'];

    function Particle() {
      this.x = rand(0, canvas.width);
      this.y = rand(0, canvas.height);
      this.r = rand(1, 3);
      this.vx = rand(-0.2, 0.2);
      this.vy = rand(-0.2, 0.2);
      this.color = colors[Math.floor(rand(0, colors.length))];
      this.alpha = rand(0.2, 0.6);
    }

    for (var i = 0; i < count; i++) particles.push(new Particle());

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      for (var a = 0; a < particles.length; a++) {
        for (var b = a + 1; b < particles.length; b++) {
          var dx = particles[a].x - particles[b].x;
          var dy = particles[a].y - particles[b].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(particles[b].x, particles[b].y);
            ctx.strokeStyle = 'rgba(140, 90, 255, ' + (1 - dist / 100) * 0.22 + ')';
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();
  })();
</script>

</body>

</html>
