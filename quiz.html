<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Quiz</title>

<link rel="stylesheet"
href="style.css">

<style>

  /* ===== EXTREME UI LAYER — matches index.html / categories.html theme ===== */

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    overflow-x: hidden;
    background: #05010d;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    display: block;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(circle at 20% 20%, rgba(140, 60, 255, 0.25), transparent 40%),
      radial-gradient(circle at 80% 30%, rgba(0, 255, 220, 0.18), transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(255, 0, 150, 0.18), transparent 45%);
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    100% { filter: hue-rotate(60deg) brightness(1.15); }
  }

  .container {
    position: relative;
    z-index: 2;
    max-width: 520px;
    margin: 6vh auto 4vh;
    padding: 30px 22px 28px;
    border-radius: 26px;
    background: rgba(18, 10, 35, 0.55);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.03) inset,
      0 25px 60px -15px rgba(0,0,0,0.7),
      0 0 90px -20px rgba(150, 60, 255, 0.55);
    text-align: center;
  }

  /* fake progress bar, purely decorative, sits above the category title */
  .container::after {
    content: "";
    display: block;
    height: 4px;
    width: 100%;
    margin-bottom: 20px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
  }

  #categoryTitle {
    font-size: 1.05rem;
    margin: 0 0 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #b9a4ff;
    opacity: 0.9;
  }

  /* ===== Timer ===== */
  .timer-bar {
    width: 100%;
    height: 6px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
    margin-bottom: 8px;
  }

  #timerFill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #00e5ff, #8a3ffc);
    transition: width 1s linear;
  }

  #timer {
    font-size: 0.9rem;
    color: #b9a4ff;
    margin-bottom: 14px;
    font-weight: 700;
  }

  #timer.timer-warning {
    color: #ff3c64;
    animation: pulseWarn 0.6s infinite alternate;
  }

  @keyframes pulseWarn {
    from { opacity: 1; }
    to   { opacity: 0.4; }
  }

  #question {
    font-size: 1.35rem;
    line-height: 1.5;
    margin: 0 0 26px;
    color: #f5f2ff;
    letter-spacing: 0.2px;
    animation: questionIn 0.4s ease;
  }

  @keyframes questionIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Generic styling for whatever score.js renders inside #options
     (works whether it creates <button>, <div>, or <label> elements) */
  #options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 26px;
  }

  #options > * {
    display: block;
    width: 100%;
    padding: 15px 18px;
    font-size: 1rem;
    font-family: inherit;
    color: #f0ecff;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 14px;
    cursor: pointer;
    text-align: left;
    transition: transform .15s ease, background .2s ease, border-color .2s ease, box-shadow .2s ease;
    opacity: 0;
    transform: translateX(-14px);
    animation: optIn 0.4s ease forwards;
  }

  #options > *:nth-child(1) { animation-delay: 0.05s; }
  #options > *:nth-child(2) { animation-delay: 0.12s; }
  #options > *:nth-child(3) { animation-delay: 0.19s; }
  #options > *:nth-child(4) { animation-delay: 0.26s; }
  #options > *:nth-child(5) { animation-delay: 0.33s; }

  @keyframes optIn {
    to { opacity: 1; transform: translateX(0); }
  }

  #options > *:hover {
    background: rgba(160, 107, 255, 0.14);
    border-color: rgba(160, 107, 255, 0.45);
  }

  #options > *:active {
    transform: scale(0.97);
  }

  #options > *:disabled {
    cursor: default;
  }

  /* Highlight state — added automatically by the script below when tapped,
     purely visual, does not interfere with score.js's own logic */
  #options > *.ui-selected {
    background: linear-gradient(135deg, rgba(138,63,252,0.35), rgba(0,229,255,0.22));
    border-color: #a06bff;
    box-shadow: 0 0 20px rgba(140,80,255,0.45);
  }

  /* correct / wrong states — set by score.js after an answer locks in */
  #options > *.correct {
    background: rgba(0, 230, 150, 0.18) !important;
    border-color: #00e696 !important;
    box-shadow: 0 0 20px rgba(0,230,150,0.4) !important;
  }

  #options > *.wrong {
    background: rgba(255, 60, 100, 0.18) !important;
    border-color: #ff3c64 !important;
    box-shadow: 0 0 20px rgba(255,60,100,0.4) !important;
  }

  @media (max-width: 420px) {
    .container { margin: 4vh 16px; padding: 24px 18px 22px; border-radius: 20px; }
    #question { font-size: 1.15rem; }
  }

</style>

</head>

<body>

<canvas id="bg-canvas"></canvas>

<div class="container">

<h2 id="categoryTitle"></h2>

<div class="timer-bar">
  <div id="timerFill"></div>
</div>
<div id="timer">15s</div>

<h3 id="question"></h3>

<div id="options"></div>

</div>

<script src="question.js"></script>

<script src="score.js"></script>

<script>
  /* ===== EXTREME UI LAYER — particle background + option tap highlight ===== */
  /* Does not touch question.js / score.js logic. Purely visual additions. */

  (function () {
    var canvas = document.getElementById('bg-canvas');
    var ctx = canvas.getContext('2d');
    var particles = [];
    var count = 45;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function rand(min, max) { return Math.random() * (max - min) + min; }
    var colors = ['#8a3ffc', '#00e5ff', '#ff4ecb', '#7f5cff'];

    function Particle() {
      this.x = rand(0, canvas.width);
      this.y = rand(0, canvas.height);
      this.r = rand(1, 3);
      this.vx = rand(-0.2, 0.2);
      this.vy = rand(-0.2, 0.2);
      this.color = colors[Math.floor(rand(0, colors.length))];
      this.alpha = rand(0.2, 0.6);
    }

    for (var i = 0; i < count; i++) particles.push(new Particle());

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = p.alpha;
        ctx.fill();
      }
      ctx.globalAlpha = 1;
      for (var a = 0; a < particles.length; a++) {
        for (var b = a + 1; b < particles.length; b++) {
          var dx = particles[a].x - particles[b].x;
          var dy = particles[a].y - particles[b].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 100) {
            ctx.beginPath();
            ctx.moveTo(particles[a].x, particles[a].y);
            ctx.lineTo(particles[b].x, particles[b].y);
            ctx.strokeStyle = 'rgba(140, 90, 255, ' + (1 - dist / 100) * 0.22 + ')';
            ctx.lineWidth = 1;
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();

    // Event delegation: whichever option the user taps inside #options
    // gets a lightweight "ui-selected" highlight class, purely cosmetic.
    var optionsEl = document.getElementById('options');

    optionsEl.addEventListener('click', function (e) {
      var target = e.target;
      // walk up to the direct child of #options that was clicked
      while (target && target.parentElement !== optionsEl) {
        target = target.parentElement;
      }
      if (!target) return;

      // clear previous highlight among siblings
      Array.prototype.forEach.call(optionsEl.children, function (child) {
        child.classList.remove('ui-selected');
      });
      target.classList.add('ui-selected');
    });

    // whenever score.js replaces the options list, the browser's
    // built-in reflow will simply re-trigger the CSS entrance animation
    // since new elements are freshly inserted — no extra code needed.
  })();
</script>

</body>

</html>
